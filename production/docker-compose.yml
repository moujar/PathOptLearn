services:
  app:
    image: python:3.11-slim
    working_dir: /app
    volumes:
      - .:/app
    ports:
      - "8501:8501"
    env_file:
      - .env
    command: >
      sh -c "pip install -r requirements.txt &&
             streamlit run src/main.py
             --server.port 8501
             --server.address 0.0.0.0
             --server.headless true"
